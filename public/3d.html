<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanal Tur — Fırça İzleri Sergisi</title>
  <meta name="description" content="Fuat Sezgin Fen Lisesi resim sergisini 3D sanal turla keşfedin." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; 
      overflow: hidden; position: fixed; 
      background: #0c0b0d; font-family: 'Inter', sans-serif; 
      touch-action: none;
    }
    canvas { display: block; touch-action: none; }

    /* Loading Screen */
    #loading-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #0c0b0d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; color: #f5f0e8;
      transition: opacity 0.6s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .loading-title { font-family: 'Playfair Display', serif; font-size: 2rem; }
    .loading-title em { color: #c9a96e; font-style: italic; }
    .loading-bar-track { width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; }
    .loading-bar-fill { height: 100%; background: #c9a96e; border-radius: 2px; width: 0%; transition: width 0.3s; }
    .loading-text { font-size: 0.8rem; color: rgba(255,255,255,0.4); }

    /* Start Overlay */
    #start-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(12,11,13,0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; color: #f5f0e8; cursor: pointer;
      backdrop-filter: blur(4px);
    }
    #start-overlay.hidden { display: none; }
    .start-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
    .start-subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
    .start-keys { display: flex; gap: 6px; margin-top: 8px; }
    .key { display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border: 1px solid rgba(201,169,110,0.4);
      border-radius: 6px; font-size: 0.75rem; font-weight: 600; color: #c9a96e; }
    .start-click { font-size: 0.72rem; color: #c9a96e; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 12px; animation: pulse 2s ease infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* HUD */
    #hud {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 30; display: flex; gap: 12px; align-items: center;
      background: rgba(12,11,13,0.7); backdrop-filter: blur(8px);
      padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.72rem; color: rgba(255,255,255,0.4);
    }
    #hud .hud-keys { display: flex; gap: 4px; }
    #hud .key { width: 24px; height: 24px; font-size: 0.6rem; }
    .crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 20px; height: 20px; z-index: 20; pointer-events: none; opacity: 0.4;
    }
    .crosshair::before, .crosshair::after {
      content: ''; position: absolute; background: #c9a96e;
    }
    .crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    .crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

    /* Artwork Info Panel (Immersive) */
    #artwork-panel {
      position: fixed; right: -100%; top: 0; bottom: 0; width: 100%; max-width: 420px; z-index: 40;
      background: #0c0b0d;
      transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
      color: #f5f0e8; display: flex; flex-direction: column;
    }
    #artwork-panel.open { right: 0; }
    
    .panel-meta-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; gap: 16px; }
    .panel-meta-left { flex: 1; }
    
    .panel-close { 
      background: rgba(201,169,110,0.15); border: 1px solid rgba(201,169,110,0.5); 
      color: #c9a96e; font-size: 0.7rem; font-family: 'Inter', sans-serif; letter-spacing: 0.05em; 
      padding: 8px 14px; border-radius: 6px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .panel-close:hover { background: rgba(201,169,110,0.3); color: #fff; }
    
    .carousel-container {
      position: relative; flex: 1; width: 100%; background: #000; overflow: hidden;
      display: flex; align-items: center; justify-content: center; touch-action: pan-y;
    }
    .carousel-track {
      display: flex; width: 100%; height: 100%; transition: transform 0.3s ease-out;
    }
    .carousel-slide {
      min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    }
    .carousel-slide img {
      width: 100%; height: 100%; object-fit: contain;
    }
    .carousel-dots {
      position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; z-index: 5;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
    .dot.active { background: #c9a96e; transform: scale(1.2); }
    .carousel-hint {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.7); font-size: 0.7rem; padding: 6px 12px; border-radius: 20px; pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }

    .panel-content {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      background: linear-gradient(to top, rgba(12,11,13,1) 40%, rgba(12,11,13,0.8) 80%, transparent);
      padding: 60px 28px 40px; transform: translateY(0); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      max-height: 70vh; overflow-y: auto;
    }
    .panel-content.hidden { transform: translateY(110%); }
    
    .panel-overline { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a96e; margin-bottom: 8px; }
    .panel-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 6px; }
    .panel-artist { font-size: 0.88rem; color: rgba(255,255,255,0.5); font-style: italic; margin-bottom: 8px; }
    .panel-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 0.78rem; color: rgba(255,255,255,0.4); }
    .panel-desc { font-size: 0.85rem; line-height: 1.7; color: rgba(255,255,255,0.8); }

    /* Back link */
    #back-link {
      position: fixed; top: 20px; left: 20px; z-index: 30;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: rgba(255,255,255,0.4);
      text-decoration: none; letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    #back-link:hover { color: #c9a96e; }

    @media (max-width: 600px) {
      .start-title { font-size: 1.3rem; }
      .start-keys { display: none; }
      #hud { display: none !important; }
    }

    /* Virtual Joystick */
    #joystick-zone {
      position: fixed; bottom: 30px; left: 30px; z-index: 35;
      width: 120px; height: 120px; display: none;
    }
    .joystick-base {
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(201,169,110,0.3);
      position: relative;
    }
    .joystick-knob {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(201,169,110,0.5); border: 2px solid rgba(201,169,110,0.7);
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      transition: background 0.1s;
    }
    .joystick-knob.active { background: rgba(201,169,110,0.8); }

    #mobile-hint {
      position: fixed; bottom: 30px; right: 30px; z-index: 35;
      font-size: 0.65rem; color: rgba(255,255,255,0.3);
      text-align: right; display: none; line-height: 1.5;
    }

    /* Name Input */
    .start-name-input {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(201,169,110,0.3);
      border-radius: 6px; padding: 10px 16px; color: #f5f0e8;
      font-family: 'Inter', sans-serif; font-size: 0.85rem;
      text-align: center; width: 220px; outline: none;
      transition: border-color 0.2s;
    }
    .start-name-input::placeholder { color: rgba(255,255,255,0.25); }
    .start-name-input:focus { border-color: #c9a96e; }

    /* Online Count */
    #online-count {
      position: fixed; top: 20px; right: 20px; z-index: 35;
      display: flex; align-items: center; gap: 6px;
      background: rgba(12,11,13,0.7); backdrop-filter: blur(8px);
      padding: 6px 14px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.72rem; color: rgba(255,255,255,0.5);
    }
    .online-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4ade80; animation: dotPulse 2s ease infinite;
    }
    @keyframes dotPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="loading-title">Fırça <em>İzleri</em></div>
    <div class="loading-bar-track"><div class="loading-bar-fill" id="loading-fill"></div></div>
    <div class="loading-text" id="loading-text">Galeri hazırlanıyor…</div>
  </div>

  <!-- Start Overlay -->
  <div id="start-overlay" class="hidden">
    <div class="start-title">Sanal Galeri</div>
    <div class="start-subtitle">Eserlerin arasında yürüyün ve keşfedin</div>
    <input type="text" class="start-name-input" id="player-name" placeholder="Adınızı yazın…" maxlength="20" autocomplete="off" />
    <div class="start-keys">
      <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
    </div>
    <div class="start-click" id="start-click-text">Tıklayarak başlayın</div>
  </div>

  <!-- Online Count -->
  <div id="online-count"><span class="online-dot"></span><span id="online-num">1</span> çevrimiçi</div>

  <!-- HUD -->
  <div id="hud" style="display:none;">
    <div class="hud-keys"><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span></div>
    <span>Hareket</span>
    <span style="opacity:0.2">|</span>
    <span>Fare: Bakış</span>
    <span style="opacity:0.2">|</span>
    <span>Tıkla: Eser detayı</span>
    <span style="opacity:0.2">|</span>
    <span>ESC: Çıkış</span>
  </div>

  <!-- Crosshair -->
  <div class="crosshair" id="crosshair" style="display:none;"></div>

  <!-- Virtual Joystick (mobile) -->
  <div id="joystick-zone">
    <div class="joystick-base" id="joystick-base">
      <div class="joystick-knob" id="joystick-knob"></div>
    </div>
  </div>

  <!-- Mobile hint -->
  <div id="mobile-hint">Parmağı sürükle: Bakış<br>Dokun: Eser detayı</div>

  <!-- Back Link -->
  <a href="/" id="back-link">← Ana Sayfa</a>

  <!-- Artwork Info Panel -->
  <div id="artwork-panel">
    <div class="carousel-container" id="carousel-container">
      <div class="carousel-hint" id="carousel-hint">Dokunarak hikayeyi gizle/göster</div>
      <div class="carousel-track" id="carousel-track">
        <!-- Slides -->
      </div>
      <div class="carousel-dots" id="carousel-dots">
        <!-- Dots -->
      </div>
    </div>

    <div class="panel-content" id="panel-content">
      <div class="panel-overline" id="panel-overline"></div>
      <h2 class="panel-title" id="panel-title"></h2>
      
      <div class="panel-meta-row">
        <div class="panel-meta-left">
          <p class="panel-artist" id="panel-artist"></p>
          <div class="panel-meta">
            <span id="panel-technique"></span>
            <span id="panel-dimensions"></span>
          </div>
        </div>
        <button class="panel-close" id="panel-close">RESMİ KAPAT</button>
      </div>

      <p class="panel-desc" id="panel-desc"></p>
    </div>
  </div>

  <!-- Socket.IO -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Three.js -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="3d.js"></script>
</body>
</html>
